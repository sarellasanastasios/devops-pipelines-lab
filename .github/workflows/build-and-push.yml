name: Build and Push to ACR

on:
  workflow_dispatch: 
  push:
    branches:
      - main

permissions:
  id-token: write  #Το χρησιμοποιώ όταν θέλω να κάνω OIDC στο Azure, το azure/login@v3 δεν μπορεί να ζητήσει OIDC login token, επίσης το Azure δεν μπορεί να εκδώσει federated token
  contents: read   #Μπορεί να διαβάσει αρχεία, και το workflow μπορεί να κάνει checkout

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build Docker image
        run: |
          docker build -t myacr11047.azurecr.io/sampleapp:latest .

      - name: Push Docker image
        run: |
          az acr login --name myacr11047
          docker push myacr11047.azurecr.io/sampleapp:latest

