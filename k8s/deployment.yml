#Aυτό είναι συμβατό για AKS,ACR,GitHub Actions
apiVersion: apps/v1
kind: Deployment
metadata:
  name: myapp-deployment
  labels:
    app: myapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
        - name: myapp
          image: myacr11047.azurecr.io/myapp:latest
          ports:
            - containerPort: 3000

