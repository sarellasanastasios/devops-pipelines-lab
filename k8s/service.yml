apiVersion: v1
kind: Service
metadata:
  name: devopsapp-service
spec:
  type: ClusterIP
  selector:
    app: devopsapp
    #Στις γραμμές 10,12,14 αν δεν βάζαμε το - protocol:TCP θα ήταν το ίδιο, γιατί το Kubernetes θεωρεί: protocol: TCP αλλά καλό είναι να το βάζουμε 
  ports: 
    - protocol: TCP
      port: 8080
      #Στο server.js υπάρχει το app.listen(8080) άρα το container μου ακούει στο 8080
      targetPort: 8080
